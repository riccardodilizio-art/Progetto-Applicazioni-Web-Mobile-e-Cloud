server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls al backend
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy per le immagini uploadate (file statici del backend)
    location /uploads/ {
        proxy_pass http://api:8080/uploads/;
        proxy_set_header Host $host;
    }

    # Gestione SPA: tutte le route vengono rimandate a index.html
    # così React Router può gestirle lato client
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache per file statici (JS, CSS, immagini)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
