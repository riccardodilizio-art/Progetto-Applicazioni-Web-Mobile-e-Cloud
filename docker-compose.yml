services:
  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=HotelSiteDb
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./Backend-hotel-site
      dockerfile: Hotel.Site.Api/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION}
      - Smtp__Host=${Smtp__Host}
      - Smtp__Port=${Smtp__Port}
      - Smtp__Username=${Smtp__Username}
      - Smtp__Password=${Smtp__Password}
      - Smtp__FromEmail=${Smtp__FromEmail}
      - Smtp__FromName=${Smtp__FromName}
      - Smtp__AdminEmail=${Smtp__AdminEmail}
      - App__FrontendUrl=${App__FrontendUrl}

    volumes:
      - ./uploads:/app/wwwroot/uploads



  frontend:
    build:
      context: ./Frontend-hotel-site
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres-data:
