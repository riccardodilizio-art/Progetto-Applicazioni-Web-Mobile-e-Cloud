services:
  postgres:
    image: postgres:17
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=HotelSiteDb
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

   api:
    build:
      context: ./Backend-hotel-site
      dockerfile: Hotel.Site.Api/Dockerfile
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=HotelSiteDb;Username=admin;Password=admin
    volumes:
      - ./uploads:/app/wwwroot/uploads



  frontend:
    build:
      context: ./Frontend-hotel-site
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres-data:
