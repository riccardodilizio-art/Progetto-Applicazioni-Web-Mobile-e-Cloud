name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Frontend-hotel-site

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend-hotel-site/package-lock.json

      - name: Installa dipendenze
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend-hotel-site/Hotel.Site.Api
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: Backend-hotel-site/**/*.trx
          retention-days: 14
  deploy:
    name: Deploy su VPS Hetzner
    runs-on: ubuntu-latest
    needs: [build, backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /home/deploy/Progetto-Applicazioni-Web-Mobile-e-Cloud
            echo "==> Pulling latest code"
            git pull origin main
            echo "==> Rebuilding containers"
            docker compose up -d --build
            echo "==> Cleaning unused images"
            docker image prune -af
            echo "==> Deploy complete"
            docker compose ps


